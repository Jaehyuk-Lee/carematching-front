name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-react:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

  build-docker:
    runs-on: ubuntu-latest
    needs: build-react
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Check for Dockerfile changes
      id: check_dockerfile
      run: |
        git fetch origin main
        if git diff --name-only origin/main...HEAD | grep -q 'Dockerfile'; then
          echo "Dockerfile has changed."
          echo "dockerfile_changed=true" >> $GITHUB_ENV
        else
          echo "Dockerfile has not changed."
          echo "dockerfile_changed=false" >> $GITHUB_ENV
        fi

    - name: Build and push Docker image
      if: env.dockerfile_changed == 'true'
      env:
        IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/carematching-frontend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $IMAGE_NAME:$IMAGE_TAG .
